<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 — Apuestas IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090f;
            --surface: #111520;
            --surface2: #171d2e;
            --surface3: #1e2540;
            --gold: #e8b84b;
            --gold-dim: rgba(232,184,75,0.12);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59,130,246,0.12);
            --text: #e8edf5;
            --text2: #8a9bc0;
            --text3: #4a5780;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --radius: 12px;
            --radius-sm: 8px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }

        /* HEADER */
        .header {
            background: linear-gradient(180deg, #0d1222 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            padding: 18px 16px 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .header-title span { color: var(--gold); }
        .header-sub {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }
        .countdown {
            background: var(--gold-dim);
            border: 1px solid rgba(232,184,75,0.3);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* FILTERS */
        .filters {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn {
            white-space: nowrap;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            border: 1px solid var(--border);
            background: var(--surface);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .filter-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #08090f;
            font-weight: 700;
        }

        /* MAIN */
        .main {
            max-width: 600px;
            margin: 0 auto;
            padding: 4px 16px 100px;
        }
        .date-group-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--text3);
            padding: 16px 0 8px;
        }

        /* FIXTURE CARD */
        .fixture-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
            transition: border-color 0.2s, background 0.2s;
        }
        .fixture-card:hover { border-color: var(--border2); background: var(--surface2); }
        .fixture-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 11px;
        }
        .fixture-round {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
        }
        .fixture-time { font-size: 12px; color: var(--text2); font-weight: 500; }
        .fixture-time.live { color: var(--red); font-weight: 700; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        .fixture-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .team { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team-flag { font-size: 30px; line-height: 1; }
        .team-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            text-align: center;
            line-height: 1.2;
        }
        .fixture-score-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 60px;
        }
        .fixture-score {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .fixture-score.pending { font-size: 18px; color: var(--text3); letter-spacing: 0; }
        .fixture-vs { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }

        /* ANALYZE BTN */
        .analyze-btn {
            width: 100%;
            padding: 10px;
            background: var(--surface3);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .analyze-btn:hover { background: var(--gold); border-color: var(--gold); color: #08090f; }
        .analyze-btn.loading { opacity: 0.7; pointer-events: none; }
        .analyze-btn.done { background: var(--green-dim); border-color: rgba(34,197,94,0.3); color: var(--green); }

        /* LOADING DOTS */
        .loading-dots { display: inline-flex; gap: 5px; align-items: center; }
        .loading-dots span {
            width: 6px; height: 6px;
            background: var(--gold); border-radius: 50%;
            animation: ldot 1s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes ldot { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }

        /* ANALYSIS PANEL */
        .analysis-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .analysis-overlay.visible { opacity: 1; pointer-events: all; }
        .analysis-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-height: 92vh;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border2);
            z-index: 201;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }
        .analysis-panel.visible { transform: translateY(0); }
        .panel-handle {
            width: 40px; height: 4px;
            background: var(--border2);
            border-radius: 2px;
            margin: 12px auto 0;
        }
        .panel-inner {
            padding: 16px 16px 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .panel-match-header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .panel-match-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 19px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.3px;
            line-height: 1.2;
            flex: 1; padding-right: 12px;
        }
        .panel-close {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface2); border-radius: 50%;
            color: var(--text2); font-size: 16px; flex-shrink: 0;
            transition: color 0.2s;
        }
        .panel-close:hover { color: var(--text); }

        /* BET CARDS */
        .bet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .bet-card {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px;
            border: 1px solid var(--border);
        }
        .bet-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text3); margin-bottom: 6px;
        }
        .bet-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 19px; font-weight: 700; margin-bottom: 3px;
            line-height: 1.2;
        }
        .bet-value.gold { color: var(--gold); }
        .bet-value.green { color: var(--green); }
        .bet-value.blue { color: var(--blue); }
        .confidence-bar {
            height: 3px; background: var(--border);
            border-radius: 2px; margin: 5px 0 3px; overflow: hidden;
        }
        .confidence-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
        .confidence-fill.gold { background: var(--gold); }
        .confidence-fill.green { background: var(--green); }
        .confidence-fill.blue { background: var(--blue); }
        .confidence-label { font-size: 10px; color: var(--text3); }
        .bet-reason { font-size: 11px; color: var(--text2); line-height: 1.45; margin-top: 5px; }

        .combined-card {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px;
            border: 1px solid rgba(232,184,75,0.2);
            margin-bottom: 10px;
        }
        .combined-card .bet-label { color: var(--gold); opacity: 0.8; }
        .combined-card .bet-value { font-size: 16px; color: var(--gold); }

        .warnings-section {
            background: var(--red-dim);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .warnings-title {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--red); margin-bottom: 6px;
        }
        .warning-item {
            font-size: 12px; color: rgba(239,68,68,0.9);
            display: flex; gap: 6px; align-items: flex-start; margin-bottom: 3px;
        }

        .summary-section {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px; border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .summary-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text3); margin-bottom: 6px;
        }
        .summary-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

        .regen-btn {
            width: 100%; padding: 12px;
            background: transparent; border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text2); font-size: 13px; font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px; text-transform: uppercase;
            transition: all 0.2s;
        }
        .regen-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* STATES */
        .empty-state {
            text-align: center; padding: 48px 24px;
        }
        .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
        .empty-state p { color: var(--text2); margin-bottom: 6px; }
        .empty-state small { color: var(--text3); font-size: 12px; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state { text-align: center; padding: 56px 24px; color: var(--text2); }
        .error-box {
            background: var(--red-dim);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius); padding: 20px;
            text-align: center; margin: 16px 0;
        }
        .error-box p { color: var(--red); font-size: 13px; margin-bottom: 14px; line-height: 1.5; }
        .retry-btn {
            padding: 9px 22px;
            background: var(--red); color: white;
            border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 700;
        }
        .panel-loading { text-align: center; padding: 36px 16px; }
        .panel-loading p { font-size: 13px; color: var(--text2); margin-top: 14px; }
        .panel-loading small { font-size: 11px; color: var(--text3); display: block; margin-top: 6px; }
        .api-counter { text-align: center; font-size: 11px; color: var(--text3); padding: 8px 0 4px; }

        @media (max-width: 420px) {
            .team-flag { font-size: 26px; }
            .team-name { font-size: 12px; }
            .fixture-score { font-size: 26px; }
            .bet-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div>
            <div class="header-title">⚽ Mundial <span>2026</span></div>
            <div class="header-sub">Recomendaciones de apuesta con IA</div>
        </div>
        <div class="countdown" id="countdown">…</div>
    </div>
</header>

<div class="filters">
    <button class="filter-btn active" data-filter="today">Hoy</button>
    <button class="filter-btn" data-filter="upcoming">Próximos 7 días</button>
    <button class="filter-btn" data-filter="played">Jugados</button>
    <button class="filter-btn" data-filter="all">Todos</button>
</div>

<main class="main" id="main-content">
    <div class="loading-state">
        <div class="spinner"></div>
        <p>Cargando partidos del Mundial 2026…</p>
    </div>
</main>

<div class="analysis-overlay" id="analysis-overlay" onclick="closePanel()"></div>
<div class="analysis-panel" id="analysis-panel">
    <div class="panel-handle"></div>
    <div class="panel-inner" id="panel-content"></div>
</div>

<script>
/* ── CONFIG ─────────────────────────────────── */
const FOOTBALL_KEY = '2a5e4ae69da762a42299f1dc4d6c8e2d';
const GEMINI_KEY   = 'AQ.Ab8RN6LmYIXd9kv2agH9ELLBaI6Qox_g_gg1ff6qg8zNXBZKpQ';
const FOOTBALL_BASE = 'https://v3.football.api-sports.io';
const GEMINI_URL    = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
const SEASON        = 2026;
const TZ            = 'America/Santiago';

/* ── STATE ───────────────────────────────────── */
let leagueId     = null;
let allFixtures  = [];
let currentFilter = 'today';
let cache        = {};   // fixtureId → analysis
let apiCalls     = 0;

/* ── FOOTBALL API ────────────────────────────── */
async function footballAPI(path) {
    apiCalls++;
    const res = await fetch(FOOTBALL_BASE + path, {
        headers: { 'x-apisports-key': FOOTBALL_KEY }
    });
    if (!res.ok) throw new Error(`API-Football ${res.status}: ${res.statusText}`);
    return res.json();
}

/* ── GEMINI API ──────────────────────────────── */
async function gemini(prompt) {
    const res = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 1200, temperature: 0.7 }
        })
    });
    if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error?.message || `Gemini ${res.status}`);
    }
    const d = await res.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

/* ── INIT ────────────────────────────────────── */
async function init() {
    startCountdown();
    bindFilters();
    try {
        const ld = await footballAPI(`/leagues?name=World%20Cup&season=${SEASON}`);
        const wc = (ld.response || []).find(l =>
            l.league.name === 'World Cup' && l.league.type === 'Cup'
        );
        if (!wc) throw new Error('No se encontró el Mundial 2026 en la API.<br>Es posible que los datos no estén disponibles todavía.');
        leagueId = wc.league.id;

        const fd = await footballAPI(`/fixtures?league=${leagueId}&season=${SEASON}&timezone=${encodeURIComponent(TZ)}`);
        allFixtures = fd.response || [];
        if (!allFixtures.length) throw new Error('No hay partidos en la API aún. Vuelve más cerca del 11 de junio.');

        renderFixtures();
    } catch (err) {
        showError(err.message);
    }
}

/* ── FILTERS ─────────────────────────────────── */
function bindFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderFixtures();
        });
    });
}

function filtered() {
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const week  = new Date(today.getTime() + 7 * 86400000);
    switch (currentFilter) {
        case 'today':
            return allFixtures.filter(f => {
                const d = new Date(f.fixture.date);
                return d >= today && d < new Date(today.getTime() + 86400000);
            });
        case 'upcoming':
            return allFixtures.filter(f => {
                const d = new Date(f.fixture.date);
                return d >= today && d <= week;
            });
        case 'played':
            return allFixtures.filter(f => f.fixture.status.short === 'FT');
        default:
            return allFixtures;
    }
}

/* ── RENDER ──────────────────────────────────── */
function renderFixtures() {
    const list = filtered();
    const el   = document.getElementById('main-content');
    if (!list.length) {
        const msgs = {
            today: 'No hay partidos hoy.',
            upcoming: 'No hay partidos en los próximos 7 días.',
            played: 'Aún no se han jugado partidos.',
            all: 'No hay partidos disponibles.'
        };
        el.innerHTML = `<div class="empty-state"><div class="icon">⚽</div><p>${msgs[currentFilter]}</p><small>El Mundial comienza el 11 de junio de 2026</small></div>`;
        return;
    }

    const grouped = {};
    list.forEach(f => {
        const d   = new Date(f.fixture.date);
        const key = d.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', timeZone: TZ });
        (grouped[key] = grouped[key] || []).push(f);
    });

    let html = '';
    for (const [date, matches] of Object.entries(grouped)) {
        html += `<div class="date-group-label">${date}</div>`;
        matches.forEach(f => { html += fixtureCard(f); });
    }
    html += `<div class="api-counter">Llamadas API usadas hoy: ${apiCalls} / 100</div>`;
    el.innerHTML = html;
}

function fixtureCard(f) {
    const live     = ['1H','2H','HT','ET','BT','P'].includes(f.fixture.status.short);
    const finished = f.fixture.status.short === 'FT';
    const hasScore = live || finished;
    const time     = new Date(f.fixture.date).toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit', timeZone: TZ });
    const cached   = cache[f.fixture.id];

    return `<div class="fixture-card" id="card-${f.fixture.id}">
        <div class="fixture-meta">
            <span class="fixture-round">${f.league.round || 'Fase de Grupos'}</span>
            <span class="fixture-time${live?' live':''}">${live ? '● EN VIVO' : finished ? 'FT' : time}</span>
        </div>
        <div class="fixture-teams">
            <div class="team">
                <div class="team-flag">${flag(f.teams.home.name)}</div>
                <div class="team-name">${f.teams.home.name}</div>
            </div>
            <div class="fixture-score-area">
                ${hasScore
                    ? `<div class="fixture-score">${f.goals.home ?? '—'} – ${f.goals.away ?? '—'}</div>`
                    : `<div class="fixture-score pending">—:—</div><div class="fixture-vs">vs</div>`
                }
            </div>
            <div class="team">
                <div class="team-flag">${flag(f.teams.away.name)}</div>
                <div class="team-name">${f.teams.away.name}</div>
            </div>
        </div>
        <button class="analyze-btn${cached?' done':''}" id="btn-${f.fixture.id}" onclick="analyzeMatch(${f.fixture.id})">
            ${cached ? '✓ Ver Análisis' : '⚡ Analizar con IA'}
        </button>
    </div>`;
}

/* ── FLAGS ───────────────────────────────────── */
const FLAGS = {
    'Argentina':'🇦🇷','Brazil':'🇧🇷','France':'🇫🇷','Spain':'🇪🇸','Germany':'🇩🇪',
    'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Netherlands':'🇳🇱','Portugal':'🇵🇹','Belgium':'🇧🇪','Uruguay':'🇺🇾',
    'Colombia':'🇨🇴','Mexico':'🇲🇽','United States':'🇺🇸','Canada':'🇨🇦','Japan':'🇯🇵',
    'South Korea':'🇰🇷','Morocco':'🇲🇦','Senegal':'🇸🇳',"Ivory Coast":'🇨🇮','Egypt':'🇪🇬',
    'Tunisia':'🇹🇳','Ghana':'🇬🇭','Australia':'🇦🇺','Iran':'🇮🇷','Saudi Arabia':'🇸🇦',
    'Iraq':'🇮🇶','Ukraine':'🇺🇦','Croatia':'🇭🇷','Switzerland':'🇨🇭','Austria':'🇦🇹',
    'Czech Republic':'🇨🇿','Norway':'🇳🇴','Ecuador':'🇪🇨','Paraguay':'🇵🇾','Turkey':'🇹🇷',
    'Algeria':'🇩🇿','Uzbekistan':'🇺🇿','DR Congo':'🇨🇩','Bosnia and Herzegovina':'🇧🇦',
    'Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti':'🇭🇹','Panama':'🇵🇦','New Zealand':'🇳🇿','Jordan':'🇯🇴',
    'Curacao':'🇨🇼','Cape Verde':'🇨🇻','Qatar':'🇶🇦','South Africa':'🇿🇦',
    'Serbia':'🇷🇸','Cameroon':'🇨🇲','Nigeria':'🇳🇬'
};
function flag(name) { return FLAGS[name] || '🏳️'; }

/* ── ANALYZE ─────────────────────────────────── */
async function analyzeMatch(fixtureId) {
    const fixture = allFixtures.find(f => f.fixture.id === fixtureId);
    if (!fixture) return;

    if (cache[fixtureId]) { showPanel(fixture, cache[fixtureId]); return; }

    const btn = document.getElementById(`btn-${fixtureId}`);
    if (btn) { btn.classList.add('loading'); btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>'; }

    showPanelLoading(fixture);

    try {
        const [hRes, aRes, h2hRes] = await Promise.all([
            footballAPI(`/teams/statistics?league=${leagueId}&season=${SEASON}&team=${fixture.teams.home.id}`),
            footballAPI(`/teams/statistics?league=${leagueId}&season=${SEASON}&team=${fixture.teams.away.id}`),
            footballAPI(`/fixtures/headtohead?h2h=${fixture.teams.home.id}-${fixture.teams.away.id}&last=8`)
        ]);

        const raw = await gemini(buildPrompt(fixture, hRes.response, aRes.response, h2hRes.response || []));

        let analysis;
        try {
            analysis = JSON.parse(raw.replace(/```json\n?|\n?```/g, '').trim());
        } catch {
            analysis = fallbackAnalysis(raw);
        }

        cache[fixtureId] = analysis;
        showPanel(fixture, analysis);
        if (btn) { btn.classList.remove('loading'); btn.classList.add('done'); btn.innerHTML = '✓ Ver Análisis'; }

    } catch (err) {
        closePanel();
        if (btn) { btn.classList.remove('loading'); btn.innerHTML = '⚡ Analizar con IA'; }
        alert(`Error: ${err.message}`);
    }
}

function fallbackAnalysis(raw) {
    return {
        ganador:           { equipo: '—', confianza: 50, razon: raw },
        goles:             { linea: '—', confianza: 50, razon: '' },
        tarjetas:          { linea: '—', confianza: 50, razon: '' },
        apuesta_combinada: { descripcion: '—', confianza: 50, razon: '' },
        advertencias:      ['Respuesta no estructurada. Ver resumen.'],
        resumen:           raw
    };
}

/* ── PROMPT ──────────────────────────────────── */
function fmtStats(s, name) {
    if (!s?.fixtures) return `${name}: Sin partidos jugados aún en el torneo.`;
    const gp = (s.fixtures.played?.home||0) + (s.fixtures.played?.away||0);
    const w  = (s.fixtures.wins?.home||0)   + (s.fixtures.wins?.away||0);
    const d  = (s.fixtures.draws?.home||0)  + (s.fixtures.draws?.away||0);
    const l  = (s.fixtures.loses?.home||0)  + (s.fixtures.loses?.away||0);
    const gf = (s.goals?.for?.total?.home||0)    + (s.goals?.for?.total?.away||0);
    const ga = (s.goals?.against?.total?.home||0) + (s.goals?.against?.total?.away||0);
    let yc = 0;
    if (s.cards?.yellow) Object.values(s.cards.yellow).forEach(v => { yc += v?.total||0; });
    return `${name} (${gp}PJ ${w}V ${d}E ${l}D): ${gf} goles anotados (${gp?((gf/gp).toFixed(1)):'-'}/PJ), ${ga} recibidos, ${yc} amarillas (${gp?((yc/gp).toFixed(1)):'-'}/PJ)`;
}

function buildPrompt(fixture, hStats, aStats, h2h) {
    const hName = fixture.teams.home.name;
    const aName = fixture.teams.away.name;
    const h2hLines = h2h.slice(0,6).map(m =>
        `  ${m.teams.home.name} ${m.goals.home}-${m.goals.away} ${m.teams.away.name} (${m.league.season})`
    ).join('\n') || '  Sin historial disponible';

    return `Eres un experto en apuestas deportivas de fútbol. Analiza el siguiente partido del Mundial 2026.

PARTIDO: ${hName} vs ${aName} | Ronda: ${fixture.league.round || 'Fase de Grupos'}

ESTADÍSTICAS EN EL MUNDIAL 2026:
${fmtStats(hStats, hName)}
${fmtStats(aStats, aName)}

HISTORIAL H2H RECIENTE:
${h2hLines}

Responde SOLO con un JSON válido (sin markdown, sin texto fuera del JSON):
{
  "ganador": { "equipo": "nombre exacto o Empate", "confianza": 65, "razon": "1-2 frases con datos concretos" },
  "goles": { "linea": "Over 2.5", "confianza": 70, "razon": "1-2 frases con datos concretos" },
  "tarjetas": { "linea": "Over 3.5", "confianza": 60, "razon": "1-2 frases con datos concretos" },
  "apuesta_combinada": { "descripcion": "Ej: Argentina gana + Over 2.5", "confianza": 55, "razon": "por qué tiene sentido combinarlas" },
  "advertencias": ["máx 2 riesgos concretos"],
  "resumen": "2-3 frases de análisis general"
}
Usa los datos del torneo si hay partidos jugados. Si no, usa el conocimiento histórico y el ranking FIFA. Responde en español.`;
}

/* ── PANEL ───────────────────────────────────── */
function showPanelLoading(f) {
    document.getElementById('panel-content').innerHTML = `
        <div class="panel-match-header">
            <div class="panel-match-title">${f.teams.home.name} vs ${f.teams.away.name}</div>
            <button class="panel-close" onclick="closePanel()">✕</button>
        </div>
        <div class="panel-loading">
            <div class="spinner"></div>
            <p>Analizando estadísticas y generando recomendación…</p>
            <small>Puede tardar unos segundos</small>
        </div>`;
    document.getElementById('analysis-overlay').classList.add('visible');
    document.getElementById('analysis-panel').classList.add('visible');
}

function col(c) { return c >= 68 ? 'green' : c >= 52 ? 'gold' : 'blue'; }

function showPanel(f, a) {
    const warns = a.advertencias?.length
        ? `<div class="warnings-section">
            <div class="warnings-title">⚠ Factores de riesgo</div>
            ${a.advertencias.map(w=>`<div class="warning-item"><span>›</span><span>${w}</span></div>`).join('')}
           </div>` : '';

    document.getElementById('panel-content').innerHTML = `
        <div class="panel-match-header">
            <div class="panel-match-title">${f.teams.home.name} vs ${f.teams.away.name}</div>
            <button class="panel-close" onclick="closePanel()">✕</button>
        </div>
        <div class="bet-grid">
            <div class="bet-card">
                <div class="bet-label">🏆 Ganador sugerido</div>
                <div class="bet-value ${col(a.ganador.confianza)}">${a.ganador.equipo}</div>
                <div class="confidence-bar"><div class="confidence-fill ${col(a.ganador.confianza)}" style="width:${a.ganador.confianza}%"></div></div>
                <div class="confidence-label">${a.ganador.confianza}% confianza</div>
                <div class="bet-reason">${a.ganador.razon}</div>
            </div>
            <div class="bet-card">
                <div class="bet-label">⚽ Over / Under goles</div>
                <div class="bet-value ${col(a.goles.confianza)}">${a.goles.linea}</div>
                <div class="confidence-bar"><div class="confidence-fill ${col(a.goles.confianza)}" style="width:${a.goles.confianza}%"></div></div>
                <div class="confidence-label">${a.goles.confianza}% confianza</div>
                <div class="bet-reason">${a.goles.razon}</div>
            </div>
            <div class="bet-card">
                <div class="bet-label">🟨 Tarjetas amarillas</div>
                <div class="bet-value ${col(a.tarjetas.confianza)}">${a.tarjetas.linea}</div>
                <div class="confidence-bar"><div class="confidence-fill ${col(a.tarjetas.confianza)}" style="width:${a.tarjetas.confianza}%"></div></div>
                <div class="confidence-label">${a.tarjetas.confianza}% confianza</div>
                <div class="bet-reason">${a.tarjetas.razon}</div>
            </div>
            <div class="bet-card">
                <div class="bet-label" style="color:rgba(232,184,75,0.7)">🎯 Apuesta combinada</div>
                <div class="bet-value gold" style="font-size:15px">${a.apuesta_combinada.descripcion}</div>
                <div class="confidence-bar"><div class="confidence-fill gold" style="width:${a.apuesta_combinada.confianza}%"></div></div>
                <div class="confidence-label">${a.apuesta_combinada.confianza}% confianza</div>
                <div class="bet-reason">${a.apuesta_combinada.razon}</div>
            </div>
        </div>
        ${warns}
        <div class="summary-section">
            <div class="summary-label">📊 Análisis general</div>
            <div class="summary-text">${a.resumen}</div>
        </div>
        <button class="regen-btn" onclick="regen(${f.fixture.id})">↻ Regenerar análisis</button>`;

    document.getElementById('analysis-overlay').classList.add('visible');
    document.getElementById('analysis-panel').classList.add('visible');
}

function closePanel() {
    document.getElementById('analysis-panel').classList.remove('visible');
    document.getElementById('analysis-overlay').classList.remove('visible');
}

async function regen(id) {
    delete cache[id];
    const btn = document.getElementById(`btn-${id}`);
    if (btn) { btn.classList.remove('done'); btn.innerHTML = '⚡ Analizar con IA'; }
    closePanel();
    setTimeout(() => analyzeMatch(id), 350);
}

/* ── COUNTDOWN ───────────────────────────────── */
function startCountdown() {
    const kickoff = new Date('2026-06-11T21:00:00-04:00'); // 21:00 Santiago
    function upd() {
        const diff = kickoff - new Date();
        const el   = document.getElementById('countdown');
        if (diff <= 0) { el.textContent = '⚽ EN CURSO'; return; }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        el.textContent = d > 0 ? `${d}d ${h}h para el inicio` : h > 0 ? `${h}h ${m}m` : `${m} minutos`;
    }
    upd();
    setInterval(upd, 60000);
}

/* ── ERROR ───────────────────────────────────── */
function showError(msg) {
    document.getElementById('main-content').innerHTML = `
        <div class="error-box">
            <p>⚠ ${msg}</p>
            <button class="retry-btn" onclick="init()">Reintentar</button>
        </div>`;
}

/* ── START ───────────────────────────────────── */
init();
</script>
